<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Solevia — Entertainment Apps</title>
<meta name="description" content="Solevia is building entertainment apps. Something fun is on the way." />
<meta property="og:title" content="Solevia" />
<meta property="og:description" content="We're building entertainment apps. Something fun is on the way." />
<meta property="og:type" content="website" />
<meta property="og:url" content="https://solevia.app" />
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎮</text></svg>" />
<style>
  :root { --bg1:#0b0721; --bg2:#160b3a; --accent:#8b5cf6; --accent2:#ec4899; --text:#f5f3ff; --muted:#a5a0c9; }
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { height:100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    color: var(--text);
    background: radial-gradient(1200px 800px at 20% 10%, #1e1150 0%, transparent 60%),
                radial-gradient(1000px 700px at 85% 90%, #3a0f4a 0%, transparent 55%),
                linear-gradient(160deg, var(--bg1), var(--bg2));
    min-height:100%;
    display:flex; align-items:center; justify-content:center;
    overflow:hidden; position:relative; text-align:center; padding:24px;
  }
  .orb { position:absolute; border-radius:50%; filter:blur(60px); opacity:.5; animation:float 14s ease-in-out infinite; }
  .orb.a { width:340px; height:340px; background:var(--accent); top:-80px; left:-60px; }
  .orb.b { width:300px; height:300px; background:var(--accent2); bottom:-90px; right:-70px; animation-delay:-6s; }
  @keyframes float { 0%,100%{transform:translateY(0) translateX(0);} 50%{transform:translateY(-28px) translateX(18px);} }
  .card { position:relative; z-index:2; max-width:680px; }
  .badge {
    display:inline-block; font-size:.78rem; letter-spacing:.18em; text-transform:uppercase;
    color:var(--muted); border:1px solid rgba(165,160,201,.28); border-radius:999px;
    padding:7px 16px; margin-bottom:28px; backdrop-filter:blur(6px);
  }
  .logo {
    font-size: clamp(3rem, 12vw, 6.5rem); font-weight:800; letter-spacing:-.03em; line-height:1;
    background: linear-gradient(90deg, #c4b5fd, #f9a8d4, #c4b5fd);
    -webkit-background-clip:text; background-clip:text; color:transparent;
    background-size:200% auto; animation:shine 6s linear infinite;
  }
  @keyframes shine { to { background-position:200% center; } }
  .tagline { margin-top:22px; font-size: clamp(1.05rem, 3.4vw, 1.5rem); font-weight:500; color:var(--text); }
  .sub { margin-top:14px; font-size: clamp(.95rem, 2.6vw, 1.05rem); color:var(--muted); line-height:1.6; }
  .dot { display:inline-block; width:8px; height:8px; border-radius:50%; background:#34d399; margin-right:8px; vertical-align:middle; box-shadow:0 0 0 0 rgba(52,211,153,.6); animation:pulse 2s infinite; }
  @keyframes pulse { 0%{box-shadow:0 0 0 0 rgba(52,211,153,.55);} 70%{box-shadow:0 0 0 10px rgba(52,211,153,0);} 100%{box-shadow:0 0 0 0 rgba(52,211,153,0);} }
  footer { position:absolute; bottom:22px; left:0; right:0; z-index:2; font-size:.82rem; color:var(--muted); }
  footer .links { margin-bottom:9px; }
  footer .links a { color:var(--muted); text-decoration:none; margin:0 7px; transition:color .15s; }
  footer .links a:hover { color:var(--accent); }
</style>
</head>
<body>
  <div class="orb a"></div>
  <div class="orb b"></div>
  <main class="card">
    <span class="badge">Coming soon</span>
    <h1 class="logo">Solevia</h1>
    <p class="tagline">We're building entertainment apps.</p>
    <p class="sub">A new studio crafting playful, delightful mobile experiences.<br />Something fun is on the way — check back soon.</p>
  </main>
  <footer>
    <div class="links"><a href="/privacy/pop-zen">Privacy</a>·<a href="/terms/pop-zen">Terms</a>·<a href="/about/pop-zen">About</a></div>
    <span class="dot"></span>© 2026 Solevia · solevia.app
  </footer>
</body>
</html>
